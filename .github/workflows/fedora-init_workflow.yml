name: Fedora Init image workflow

on:
  push:
    branches:
      - master
    paths:
      - 'fedora/**'
      - 'helper_scripts/buildah_multiarch.sh'
      - '.github/workflows/fedora-init_workflow.yml'
  pull_request:
    branches:
      - master
    paths:
      - 'fedora/**'
      - 'helper_scripts/buildah_multiarch.sh'
      - '.github/workflows/fedora-init_workflow.yml'
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 0'

jobs:
  build-push-init-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.1.6

      - name: Setup buildah
        uses: deamen/gh-actions/setup-buildah@master
        with:
          os: 'ubuntu'

      - name: Build Fedora init image for amd64
        run: |
          ARCH=amd64 ./fedora/buildah_fedora-init.sh

      - name: Build Fedora init image for arm64
        run: |
          ARCH=arm64 ./fedora/buildah_fedora-init.sh

      - name: Log in to the Container registry with buildah
        run: |
          buildah login \
          --username ${{ vars.REGISTRY_USERNAME }} \
          --password ${{ secrets.REGISTRY_PASSWORD }} \
          ${{ vars.REGISTRY_SERVER }}

      - name: Create and push multi-arch manifest for init image
        run: |
          ./helper_scripts/buildah_multiarch.sh quay.io/deamen/fedora-init
